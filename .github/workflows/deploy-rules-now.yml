name: Deploy Rules Now
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-auth google-auth-httplib2 requests
      - name: Deploy firestore rules
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          python3 << 'PYEOF'
          import json
          import google.auth.transport.requests
          from google.oauth2 import service_account
          import requests
          with open('/tmp/sa.json') as f: sa = json.load(f)
          PROJECT = sa['project_id']
          creds = service_account.Credentials.from_service_account_info(sa,
              scopes=['https://www.googleapis.com/auth/cloud-platform','https://www.googleapis.com/auth/firebase'])
          creds.refresh(google.auth.transport.requests.Request())
          h = {'Authorization': f'Bearer {creds.token}', 'Content-Type': 'application/json'}
          with open('firestore.rules') as f:
              rules = f.read()
          # Create ruleset
          r = requests.post(f'https://firebaserules.googleapis.com/v1/projects/{PROJECT}/rulesets',
              headers=h, json={'source': {'files': [{'name': 'firestore.rules', 'content': rules}]}})
          print(f"::notice title=Ruleset::status={r.status_code}")
          if r.ok:
              name = r.json()['name']
              rel = requests.patch(f'https://firebaserules.googleapis.com/v1/projects/{PROJECT}/releases/cloud.firestore',
                  headers=h, json={'release': {'name': f'projects/{PROJECT}/releases/cloud.firestore', 'rulesetName': name}})
              print(f"::notice title=Release::status={rel.status_code}")
              if not rel.ok:
                  cr = requests.post(f'https://firebaserules.googleapis.com/v1/projects/{PROJECT}/releases',
                      headers=h, json={'name': f'projects/{PROJECT}/releases/cloud.firestore', 'rulesetName': name})
                  print(f"::notice title=CreateRelease::status={cr.status_code}")
          else:
              print(f"::notice title=Err::{r.text[:200]}")
          PYEOF
