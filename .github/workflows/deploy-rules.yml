name: Deploy Firebase Security Rules

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Firestore & Storage Rules
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install google-auth requests

      - name: Install Firebase CLI
        run: |
          for i in 1 2 3; do
            if npm install -g firebase-tools@latest; then
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Check FIREBASE_SERVICE_ACCOUNT secret
        id: check_sa
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT not set — skipping rules deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "FIREBASE_SERVICE_ACCOUNT found (${#GOOGLE_APPLICATION_CREDENTIALS} chars)"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Write service account to disk
        if: steps.check_sa.outputs.skip != 'true'
        run: |
          printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS" > /tmp/fb_sa.json
          python3 -c "import json; json.load(open('/tmp/fb_sa.json'))" || {
            echo "ERROR: FIREBASE_SERVICE_ACCOUNT secret is not valid JSON."
            exit 1
          }
          echo "Service account JSON validated successfully"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # ── PRIMARY: Deploy Firestore rules via REST API ──
      # Bypasses the `firebase deploy` CLI's pre-flight check on
      # serviceusage.googleapis.com (which needs serviceusage.services.get).
      - name: Deploy Firestore Rules (REST API)
        id: rest_deploy
        if: steps.check_sa.outputs.skip != 'true'
        continue-on-error: true
        run: |
          echo "=== Deploying Firestore rules via Firebase Rules REST API ==="
          python3 scripts/deploy_firestore_rules.py /tmp/fb_sa.json

      # ── FALLBACK: firebase CLI (last resort) ──
      - name: Fallback - firebase CLI
        if: steps.check_sa.outputs.skip != 'true' && steps.rest_deploy.outcome == 'failure'
        continue-on-error: true
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/fb_sa.json
          echo "=== Trying firebase CLI as fallback ==="
          firebase deploy --only firestore:rules --project memora-bond --force 2>&1 | tail -20 || {
            echo "Firebase CLI also failed."
          }

      # ── SUMMARY: Report clear status ──
      - name: Deploy status summary
        if: steps.check_sa.outputs.skip != 'true'
        run: |
          if [ "${{ steps.rest_deploy.outcome }}" = "success" ]; then
            echo "[OK] Firestore rules deployed successfully via REST API"
          else
            echo "[FAIL] Firestore rules deploy FAILED via all methods."
            echo ""
            echo "The FIREBASE_SERVICE_ACCOUNT secret has LIMITED permissions:"
            echo "  - CAN create rulesets (firebaserules.rulesets.create)"
            echo "  - CANNOT update releases (firebaserules.releases.update)"
            echo "  - CANNOT check service usage (serviceusage.services.get)"
            echo ""
            echo "FIX: In Google Cloud Console -> IAM & Admin -> IAM, find the"
            echo "service account used by GitHub Actions (the email in the"
            echo "FIREBASE_SERVICE_ACCOUNT secret) and grant ONE of these roles:"
            echo ""
            echo "  roles/firebase.admin       (Firebase Admin - recommended)"
            echo "  roles/firebaserules.admin  (Firebase Rules Admin - minimal)"
            echo "  roles/editor               (Editor - broad)"
            echo "  roles/owner                (Owner - broadest)"
            echo ""
            echo "After granting the role, re-run this workflow:"
            echo "  Actions -> Deploy Firebase Security Rules -> Run workflow"
            echo ""
            echo "The rules file (firestore.rules) is correct and committed."
            echo "Only the IAM permission is missing - no code changes needed."
            echo ""
            echo "IMPORTANT: The rules fix is critical for profile saving."
            echo "Without it, verified/premium/business users cannot edit"
            echo "their bio, avatar, or display name (permission denied)."
            exit 1
          fi

      # ── Storage rules (non-critical) ──
      - name: Deploy Storage Rules
        if: steps.check_sa.outputs.skip != 'true' && steps.rest_deploy.outcome == 'success'
        continue-on-error: true
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/fb_sa.json
          firebase deploy --only storage --project memora-bond --force || {
            echo "Storage rules deploy failed (non-fatal)."
          }

      - name: Cleanup
        if: always()
        run: rm -f /tmp/fb_sa.json
