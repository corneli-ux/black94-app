name: Deploy Firebase Security Rules

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Firestore & Storage Rules
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install google-auth requests

      - name: Install Firebase CLI
        run: |
          for i in 1 2 3; do
            if npm install -g firebase-tools@latest; then
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Check FIREBASE_SERVICE_ACCOUNT secret
        id: check_sa
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT not set — skipping rules deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "FIREBASE_SERVICE_ACCOUNT found (${#GOOGLE_APPLICATION_CREDENTIALS} chars)"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Write service account to disk
        if: steps.check_sa.outputs.skip != 'true'
        run: |
          printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS" > /tmp/fb_sa.json
          # Verify the service account file is valid JSON
          python3 -c "import json; json.load(open('/tmp/fb_sa.json'))" || {
            echo "ERROR: FIREBASE_SERVICE_ACCOUNT secret is not valid JSON."
            exit 1
          }
          echo "Service account JSON validated successfully"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # ── PRIMARY: Deploy Firestore rules via REST API ──
      # This bypasses the `firebase deploy` CLI's pre-flight check on
      # serviceusage.googleapis.com, which fails with 403 if the service
      # account lacks `serviceusage.services.get` permission (common for
      # Firebase Admin-only roles).
      #
      # The REST API only needs firebaserules.rulesets.create and
      # firebaserules.releases.update, both granted by Firebase Admin /
      # Firebase Rules Admin / Editor / Owner roles.
      - name: Deploy Firestore Rules (REST API)
        if: steps.check_sa.outputs.skip != 'true'
        run: |
          echo "=== Deploying Firestore rules via Firebase Rules REST API ==="
          python3 scripts/deploy_firestore_rules.py /tmp/fb_sa.json

      # ── FALLBACK: If REST API fails, try the firebase CLI ──
      # Some rules (e.g., complex function chains) may need the CLI's
      # validation step. Keep this as a backup.
      - name: Fallback - Deploy Firestore Rules (firebase CLI)
        if: steps.check_sa.outputs.skip != 'true' && failure()
        continue-on-error: true
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/fb_sa.json
          echo "=== Trying firebase CLI as fallback ==="
          firebase deploy --only firestore:rules --project memora-bond --force || {
            echo "Firebase CLI also failed — the REST API deploy above is the primary path."
            echo "If both failed, check IAM permissions for the service account."
          }

      # ── Storage rules (still via CLI — no REST equivalent needed) ──
      - name: Deploy Storage Rules
        if: steps.check_sa.outputs.skip != 'true'
        continue-on-error: true
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/fb_sa.json
          firebase deploy --only storage --project memora-bond --force || {
            echo "Storage rules deploy failed (non-fatal) — Firestore rules are the critical ones."
          }

      - name: Cleanup
        if: always()
        run: rm -f /tmp/fb_sa.json
