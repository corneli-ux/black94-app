name: Check OAuth Clients

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install google-auth google-auth-httplib2 requests
      - name: Check OAuth clients and SHA
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          python3 << 'PYEOF'
          import json
          import google.auth.transport.requests
          from google.oauth2 import service_account
          import requests

          with open('/tmp/sa.json') as f:
              sa = json.load(f)
          PROJECT = sa['project_id']
          creds = service_account.Credentials.from_service_account_info(
              sa, scopes=['https://www.googleapis.com/auth/cloud-platform','https://www.googleapis.com/auth/firebase'])
          creds.refresh(google.auth.transport.requests.Request())
          h = {'Authorization': f'Bearer {creds.token}'}

          # 1. Firebase SHA fingerprints
          r = requests.get(f'https://firebase.googleapis.com/v1beta1/projects/{PROJECT}/androidApps', headers=h)
          apps = r.json().get('apps', [])
          for app in apps:
              aid = app['appId']
              rs = requests.get(f'https://firebase.googleapis.com/v1beta1/projects/{PROJECT}/androidApps/{aid}/sha', headers=h)
              shas = rs.json().get('shaCertificates', [])
              msg = f"app={aid} pkg={app.get('packageName')} sha_count={len(shas)}"
              for s in shas:
                  msg += f" | {s.get('certType')}={s.get('shaHash')[:16]}"
              print(f"::notice title=FirebaseSHA::{msg}")

          # 2. Identity Toolkit Google IdP config (web client)
          r = requests.get(f'https://identitytoolkit.googleapis.com/admin/v2/projects/{PROJECT}/defaultSupportedIdpConfigs/google.com', headers=h)
          if r.ok:
              cfg = r.json()
              print(f"::notice title=GoogleIdP::enabled={cfg.get('enabled')} clientId={cfg.get('clientId','NONE')[:40]}")
          else:
              print(f"::notice title=GoogleIdP::status={r.status_code} body={r.text[:100]}")
          PYEOF
