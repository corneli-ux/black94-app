name: Check OAuth Clients
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-auth google-auth-httplib2 requests
      - name: Confirm registration
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          python3 << 'PYEOF'
          import json, time
          import google.auth.transport.requests
          from google.oauth2 import service_account
          import requests
          with open('/tmp/sa.json') as f: sa = json.load(f)
          PROJECT = sa['project_id']
          SHA1 = 'FA9C5E1009650591642C0E44CC82370D1489202A'
          creds = service_account.Credentials.from_service_account_info(sa,
              scopes=['https://www.googleapis.com/auth/cloud-platform','https://www.googleapis.com/auth/firebase'])
          creds.refresh(google.auth.transport.requests.Request())
          h = {'Authorization': f'Bearer {creds.token}', 'Content-Type': 'application/json'}
          r = requests.get(f'https://firebase.googleapis.com/v1beta1/projects/{PROJECT}/androidApps', headers=h)
          aid = r.json()['apps'][0]['appId']
          time.sleep(3)
          # Try add again - should now say exists in SAME project
          add = requests.post(f'https://firebase.googleapis.com/v1beta1/projects/{PROJECT}/androidApps/{aid}/sha',
              headers=h, json={'shaHash': SHA1, 'certType': 'SHA_1'})
          if add.ok:
              print("::notice title=Confirm::Added again 200 (was not there) - checking list")
          else:
              err = add.json().get('error', {})
              msg = err.get('message','').replace(SHA1,'NEW_SHA')
              # If "different project" -> still conflict. If just exists -> registered HERE
              if 'different project' in msg.lower():
                  print(f"::notice title=Confirm::STILL_CONFLICT msg={msg}")
              else:
                  print(f"::notice title=Confirm::REGISTERED_HERE (409 same project) msg={msg}")
          # Final list
          rs = requests.get(f'https://firebase.googleapis.com/v1beta1/projects/{PROJECT}/androidApps/{aid}/sha', headers=h)
          shas = rs.json().get('shaCertificates', [])
          print(f"::notice title=FinalCount::{len(shas)}")
          for s in shas:
              print(f"::notice title=Registered::{s.get('shaHash')}")
          PYEOF
