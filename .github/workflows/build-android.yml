name: Build Android APK & AAB (Standalone for Device)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  build:
    name: Build Standalone Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle (no caching)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Install dependencies
        run: npm ci --prefer-offline || npm install

      - name: Clear caches
        run: |
          rm -rf node_modules/.cache .expo /tmp/metro-* || true
          npx expo export --clear 2>/dev/null || true

      - name: Expo export (create standalone bundle)
        run: npx expo export --platform android --output-dir dist

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Copy exported bundle into Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp -r dist/* android/app/src/main/assets/ || true
          echo "Bundle copied for standalone use"

      - name: Disable Gradle cache
        run: |
          echo "org.gradle.caching=false" >> android/gradle.properties
          echo "org.gradle.parallel=false" >> android/gradle.properties

      # === DEBUG BUILD (always succeeds, no signing needed) ===
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-build-cache --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: black94-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # === RELEASE BUILD (best effort, needs keystore) ===
      - name: Build Release APK + AAB
        continue-on-error: true
        run: |
          if [ -f ../ci/black94-release.jks ]; then
            cp ../ci/black94-release.jks android/app/black94-release.jks
            cd android
            chmod +x gradlew
            ./gradlew assembleRelease bundleRelease --no-build-cache --no-daemon
          else
            echo "No keystore found, skipping release build"
          fi

      - name: Upload Release APK
        if: success()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Release AAB
        if: success()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
