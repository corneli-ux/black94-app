name: Build Android APK & AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install npm dependencies
        run: npm install

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild --platform android --clean

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/black94-release.jks

      - name: Patch build.gradle for release signing + device-only ABIs
        run: |
          cat > /tmp/patch_build.py << 'PYEOF'
          import re

          filepath = 'android/app/build.gradle'
          with open(filepath, 'r') as f:
              content = f.read()

          # 1) Add signing config if not present
          signing_config = '''
          signingConfigs {
              release {
                  storeFile file('black94-release.jks')
                  storePassword System.getenv("KEYSTORE_PASSWORD")
                  keyAlias System.getenv("KEY_ALIAS")
                  keyPassword System.getenv("KEY_PASSWORD")
              }
          }
          '''

          if 'signingConfigs' not in content:
              # Insert before defaultConfig or buildTypes
              if 'defaultConfig' in content:
                  content = content.replace('defaultConfig', signing_config.strip() + '\n\ndefaultConfig', 1)
                  print('Added signingConfigs')
              else:
                  print('WARNING: Could not find defaultConfig to insert signingConfigs')
          else:
              print('signingConfigs already present')

          # 2) Wire release buildType to use the signing config
          if 'buildTypes' in content and 'release {' in content:
              if 'signingConfig' not in content.split('buildTypes')[1].split('}')[0]:
                  content = re.sub(
                      r'(buildTypes\s*\{[^}]*?release\s*\{)',
                      r'\1\n            signingConfig signingConfigs.release',
                      content,
                      count=1
                  )
                  print('Wired release signingConfig')
              else:
                  print('Release signingConfig already wired')
          else:
              print('WARNING: Could not find buildTypes release block')

          # 3) Add ndk abiFilters to defaultConfig
          pattern = r'(defaultConfig\s*\{[^}]*?versionName\s+"[^"]+"\s*\n)'
          ndk_block = """
              ndk {
                  abiFilters 'arm64-v8a', 'armeabi-v7a'
              }
          """
          new_content = re.sub(pattern, r'\1' + ndk_block, content)

          if new_content != content:
              content = new_content
              print('Added ABI filters')
          else:
              print('ABI filters already present or pattern not found')

          with open(filepath, 'w') as f:
              f.write(content)
          PYEOF
          python3 /tmp/patch_build.py

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          echo "APK built successfully"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  build-aab:
    name: Build AAB (App Bundle)
    runs-on: ubuntu-latest
    needs: build-apk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install npm dependencies
        run: npm install

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/black94-release.jks

      - name: Patch build.gradle for release signing + device-only ABIs
        run: |
          cat > /tmp/patch_build.py << 'PYEOF'
          import re

          filepath = 'android/app/build.gradle'
          with open(filepath, 'r') as f:
              content = f.read()

          signing_config = '''
          signingConfigs {
              release {
                  storeFile file('black94-release.jks')
                  storePassword System.getenv("KEYSTORE_PASSWORD")
                  keyAlias System.getenv("KEY_ALIAS")
                  keyPassword System.getenv("KEY_PASSWORD")
              }
          }
          '''

          if 'signingConfigs' not in content:
              if 'defaultConfig' in content:
                  content = content.replace('defaultConfig', signing_config.strip() + '\n\ndefaultConfig', 1)
                  print('Added signingConfigs')
          else:
              print('signingConfigs already present')

          if 'buildTypes' in content and 'release {' in content:
              if 'signingConfig' not in content.split('buildTypes')[1].split('}')[0]:
                  content = re.sub(
                      r'(buildTypes\s*\{[^}]*?release\s*\{)',
                      r'\1\n            signingConfig signingConfigs.release',
                      content,
                      count=1
                  )
                  print('Wired release signingConfig')

          pattern = r'(defaultConfig\s*\{[^}]*?versionName\s+"[^"]+"\s*\n)'
          ndk_block = """
              ndk {
                  abiFilters 'arm64-v8a', 'armeabi-v7a'
              }
          """
          new_content = re.sub(pattern, r'\1' + ndk_block, content)
          if new_content != content:
              content = new_content
              print('Added ABI filters')

          with open(filepath, 'w') as f:
              f.write(content)
          PYEOF
          python3 /tmp/patch_build.py

      - name: Build Release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
          echo "AAB built successfully"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
