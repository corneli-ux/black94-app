name: Build Android APK & AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  build:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # NO npm cache — prevents stale node_modules from previous builds

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      # ROOT CAUSE FIX #1: Disable ALL Gradle caching
      # Previously gradle/actions/setup-gradle@v4 cached ~/.gradle/caches between
      # builds, causing Metro JS bundles to be reused from stale builds even though
      # source code had changed. This was the PRIMARY reason committed fixes never
      # appeared in the APK.
      - name: Setup Gradle (NO caching)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-includes: |
            wrappers/dists/**
          gradle-home-cache-excludes: |
            caches/**
            build-cache/**

      # ROOT CAUSE FIX #2: Use npm ci for deterministic dependency installation
      # Previously npm install could produce different node_modules when combined
      # with cache restoration, leading to missing or incorrect native modules.
      - name: Install npm dependencies (deterministic)
        run: npm ci --prefer-offline 2>&1 || npm install

      # ROOT CAUSE FIX #3: Clear ALL Metro bundler caches before prebuild
      - name: Clear Metro and Expo caches
        run: |
          rm -rf node_modules/.cache
          rm -rf .expo
          rm -rf /tmp/metro-*
          rm -rf /tmp/haste-map-*
          npx expo export --clear 2>/dev/null || true
          echo "All Metro/Expo caches cleared"

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild --platform android --clean

      # ROOT CAUSE FIX #4: Disable Gradle build cache in generated project
      - name: Disable Gradle build cache
        run: |
          echo "org.gradle.caching=false" >> android/gradle.properties
          echo "org.gradle.parallel=false" >> android/gradle.properties
          echo "Gradle build cache and parallelism disabled for reproducible builds"

      - name: Fix splashscreen_logo drawable
        run: |
          cp assets/icon.png android/app/src/main/res/drawable/splashscreen_logo.png
          echo "Created splashscreen_logo drawable from app icon"
          ls -la android/app/src/main/res/drawable/splashscreen_logo.png

      - name: Setup release keystore and signing config
        run: |
          cp ci/black94-release.jks android/app/black94-release.jks

          echo "=== Verifying keystore ==="
          keytool -list -v -keystore android/app/black94-release.jks \
            -storepass 'black94real' -alias 'black94' 2>&1 | grep SHA1

          python3 << 'PYEOF'
          filepath = 'android/app/build.gradle'
          with open(filepath, 'r') as f:
              lines = f.readlines()

          new_lines = []
          i = 0
          added_release_signing = False
          while i < len(lines):
              line = lines[i]

              if not added_release_signing and line.strip() == '}' and 'signingConfigs' in ''.join(lines[max(0,i-10):i]):
                  indent = '    '
                  new_lines.append(line)
                  new_lines.append(f'{indent}release {{\n')
                  new_lines.append(f'{indent}    storeFile file(\'black94-release.jks\')\n')
                  new_lines.append(f'{indent}    storePassword \'black94real\'\n')
                  new_lines.append(f'{indent}    keyAlias \'black94\'\n')
                  new_lines.append(f'{indent}    keyPassword \'black94real\'\n')
                  new_lines.append(f'{indent}}}\n')
                  added_release_signing = True
                  i += 1
                  continue

              if 'signingConfig signingConfigs.debug' in line:
                  line = line.replace('signingConfigs.debug', 'signingConfigs.release')

              new_lines.append(line)
              i += 1

          with open(filepath, 'w') as f:
              f.writelines(new_lines)

          print(f"Added release signing config: {added_release_signing}")
          PYEOF

          echo "=== Verifying build.gradle signing config ==="
          rg "signingConfig" android/app/build.gradle || echo "WARNING: no signingConfig found"
          rg "black94-release.jks" android/app/build.gradle || echo "WARNING: no keystore reference found"

      - name: Add ABI filters
        run: |
          python3 << 'PYEOF'
          import re
          filepath = 'android/app/build.gradle'
          with open(filepath, 'r') as f:
              content = f.read()

          if 'abiFilters' not in content:
              pattern = r"(defaultConfig\s*\{[^}]*?versionName\s+\"[^\"]+\"\s*\n)"
              ndk_block = '\n              ndk {\n                  abiFilters \'arm64-v8a\', \'armeabi-v7a\'\n              }\n'
              new_content = re.sub(pattern, r'\1' + ndk_block, content)
              if new_content != content:
                  content = new_content
                  print('Added ABI filters')
          else:
              print('ABI filters already present')

          with open(filepath, 'w') as f:
              f.write(content)
          PYEOF

      # ROOT CAUSE FIX #5: Build both APK and AAB in a single Gradle invocation
      # Previously they were separate jobs — the AAB job was MISSING clean and
      # --no-build-cache, so AAB builds always contained stale code. Now both
      # are built fresh in one pass with clean + no-build-cache.
      - name: Build Release APK + AAB (clean, no cache)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease bundleRelease --no-build-cache --no-daemon
          echo "=== Build complete ==="

      # Verify the JS bundle was created fresh (not reused from cache)
      - name: Verify JS bundle
        run: |
          BUNDLE_DIR="android/app/build/generated/assets/createBundleReleaseJsAndAssets"
          if [ -d "$BUNDLE_DIR" ]; then
            echo "JS bundle found:"
            ls -la "$BUNDLE_DIR/"*.bundle 2>/dev/null || ls -la "$BUNDLE_DIR"/index.android.bundle 2>/dev/null
            echo "Bundle size:"
            du -sh "$BUNDLE_DIR" 2>/dev/null
          else
            echo "ERROR: JS bundle directory not found!"
            ls -la android/app/build/generated/assets/ 2>/dev/null || true
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
