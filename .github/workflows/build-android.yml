name: Build Android APK & AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install npm dependencies
        run: npm install

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild --platform android --clean

      - name: Setup release keystore and signing config
        run: |
          # Copy production keystore
          cp ci/black94-release.jks android/app/black94-release.jks

          # Verify keystore SHA-1
          echo "=== Verifying keystore ==="
          keytool -list -v -keystore android/app/black94-release.jks \
            -storepass 'black94real' -alias 'black94' 2>&1 | grep SHA1

          # Add release signing config after debug signing config using Python
          # (sed can't reliably handle multi-line insertions with correct indentation)
          python3 << 'PYEOF'
          filepath = 'android/app/build.gradle'
          with open(filepath, 'r') as f:
              lines = f.readlines()

          new_lines = []
          i = 0
          added_release_signing = False
          while i < len(lines):
              line = lines[i]

              # After the debug signingConfig closing brace, add release config
              if not added_release_signing and line.strip() == '}' and 'signingConfigs' in ''.join(lines[max(0,i-10):i]):
                  # Check if next non-empty line closes signingConfigs or starts buildTypes
                  # Look ahead to see if this } closes the debug block (not signingConfigs)
                  # We're inside signingConfigs { debug { ... } <-- here
                  # After this }, signingConfigs continues, so add release config
                  indent = '    '
                  new_lines.append(line)  # the closing } of debug block
                  new_lines.append(f'{indent}release {{\n')
                  new_lines.append(f'{indent}    storeFile file(\'black94-release.jks\')\n')
                  new_lines.append(f'{indent}    storePassword \'black94real\'\n')
                  new_lines.append(f'{indent}    keyAlias \'black94\'\n')
                  new_lines.append(f'{indent}    keyPassword \'black94real\'\n')
                  new_lines.append(f'{indent}}}\n')
                  added_release_signing = True
                  i += 1
                  continue

              # Change release buildType signingConfig from debug to release
              if 'signingConfig signingConfigs.debug' in line:
                  line = line.replace('signingConfigs.debug', 'signingConfigs.release')

              new_lines.append(line)
              i += 1

          with open(filepath, 'w') as f:
              f.writelines(new_lines)

          print(f"Added release signing config: {added_release_signing}")
          PYEOF

          # Verify the build.gradle has correct signing
          echo "=== Verifying build.gradle signing config ==="
          rg "signingConfig" android/app/build.gradle || echo "WARNING: no signingConfig found"
          rg "black94-release.jks" android/app/build.gradle || echo "WARNING: no keystore reference found"

      - name: Add ABI filters
        run: |
          python3 << 'PYEOF'
          import re
          filepath = 'android/app/build.gradle'
          with open(filepath, 'r') as f:
              content = f.read()

          if 'abiFilters' not in content:
              pattern = r"(defaultConfig\s*\{[^}]*?versionName\s+\"[^\"]+\"\s*\n)"
              ndk_block = '\n              ndk {\n                  abiFilters \'arm64-v8a\', \'armeabi-v7a\'\n              }\n'
              new_content = re.sub(pattern, r'\1' + ndk_block, content)
              if new_content != content:
                  content = new_content
                  print('Added ABI filters')
          else:
              print('ABI filters already present')

          with open(filepath, 'w') as f:
              f.write(content)
          PYEOF

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          echo "APK built successfully"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  build-aab:
    name: Build AAB (App Bundle)
    runs-on: ubuntu-latest
    needs: build-apk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install npm dependencies
        run: npm install

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Setup release keystore and signing config
        run: |
          cp ci/black94-release.jks android/app/black94-release.jks
          echo "=== Verifying keystore ==="
          keytool -list -v -keystore android/app/black94-release.jks \
            -storepass 'black94real' -alias 'black94' 2>&1 | grep SHA1

          python3 << 'PYEOF'
          filepath = 'android/app/build.gradle'
          with open(filepath, 'r') as f:
              lines = f.readlines()

          new_lines = []
          i = 0
          added_release_signing = False
          while i < len(lines):
              line = lines[i]
              if not added_release_signing and line.strip() == '}' and 'signingConfigs' in ''.join(lines[max(0,i-10):i]):
                  indent = '    '
                  new_lines.append(line)
                  new_lines.append(f'{indent}release {{\n')
                  new_lines.append(f'{indent}    storeFile file(\'black94-release.jks\')\n')
                  new_lines.append(f'{indent}    storePassword \'black94real\'\n')
                  new_lines.append(f'{indent}    keyAlias \'black94\'\n')
                  new_lines.append(f'{indent}    keyPassword \'black94real\'\n')
                  new_lines.append(f'{indent}}}\n')
                  added_release_signing = True
                  i += 1
                  continue
              if 'signingConfig signingConfigs.debug' in line:
                  line = line.replace('signingConfigs.debug', 'signingConfigs.release')
              new_lines.append(line)
              i += 1

          with open(filepath, 'w') as f:
              f.writelines(new_lines)
          print(f"Added release signing config: {added_release_signing}")
          PYEOF

          echo "=== Verifying build.gradle signing config ==="
          rg "signingConfig" android/app/build.gradle

      - name: Add ABI filters
        run: |
          python3 << 'PYEOF'
          import re
          filepath = 'android/app/build.gradle'
          with open(filepath, 'r') as f:
              content = f.read()
          if 'abiFilters' not in content:
              pattern = r"(defaultConfig\s*\{[^}]*?versionName\s+\"[^\"]+\"\s*\n)"
              ndk_block = '\n              ndk {\n                  abiFilters \'arm64-v8a\', \'armeabi-v7a\'\n              }\n'
              new_content = re.sub(pattern, r'\1' + ndk_block, content)
              if new_content != content:
                  content = new_content
                  print('Added ABI filters')
          with open(filepath, 'w') as f:
              f.write(content)
          PYEOF

      - name: Build Release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
          echo "AAB built successfully"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
