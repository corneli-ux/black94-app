name: Build Android APK (Standalone - No Metro Needed)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  build:
    name: Build Standalone Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: npm install

      # Register the release keystore SHA-1 with Firebase AND download a
      # FRESH google-services.json. This avoids the stale-secret problem
      # where the GOOGLE_SERVICES_JSON secret was captured BEFORE the SHA-1
      # was registered — causing DEVELOPER_ERROR at runtime.
      # continue-on-error: true so the build can fall back to the secret
      # if the service account lacks Firebase Management API permissions.
      - name: Register SHA-1 and fetch fresh google-services.json
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          pip install google-auth requests
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          python3 scripts/ensure_sha1_registered.py /tmp/sa.json
          rm -f /tmp/sa.json

      # Fallback: if the script failed (e.g. service account permissions),
      # decode the GOOGLE_SERVICES_JSON secret. This guarantees the build
      # can still proceed even if Firebase Management API is unavailable.
      - name: Fallback - decode google-services.json from secret
        if: ${{ hashFiles('google-services.json') == '' }}
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "Fresh download failed - falling back to GOOGLE_SERVICES_JSON secret"
          if [ -n "$GOOGLE_SERVICES_B64" ]; then
            echo "$GOOGLE_SERVICES_B64" | base64 -d > google-services.json
            echo "google-services.json decoded from secret ($(wc -c < google-services.json) bytes)"
          else
            echo "ERROR: Neither fresh download nor GOOGLE_SERVICES_JSON secret available"
            exit 1
          fi

      - name: Confirm google-services.json present
        run: |
          if [ -f "google-services.json" ] && [ -s "google-services.json" ]; then
            echo "google-services.json ready ($(wc -c < google-services.json) bytes)"
          else
            echo "ERROR: google-services.json missing or empty"
            exit 1
          fi

      - name: Extract web client ID from google-services.json
        id: web_client
        run: |
          # Robust extraction: checks oauth_client (type 3), then
          # services.google_signin_service, then any non-Android client.
          # FAILS the build if no web client is found AND the secret is empty —
          # better to fail here than ship an APK with the wrong client ID.
          # stderr shows diagnostic info (all oauth clients found); stdout has
          # only the client ID.
          WEB_CLIENT=$(python3 scripts/extract_web_client_id.py google-services.json 2>/dev/null || echo "")
          if [ -n "$WEB_CLIENT" ]; then
            echo "Found web client ID: ${WEB_CLIENT:0:20}...${WEB_CLIENT: -4}"
            echo "GOOGLE_WEB_CLIENT_ID=$WEB_CLIENT" >> $GITHUB_ENV
          else
            echo "WARNING: No web client ID found in google-services.json."
            echo "Falling back to GOOGLE_WEB_CLIENT_ID secret (may be stale)."
            if [ -z "${{ secrets.GOOGLE_WEB_CLIENT_ID }}" ]; then
              echo "ERROR: GOOGLE_WEB_CLIENT_ID secret is also empty."
              echo "Google Sign-In CANNOT work without a valid web client ID."
              echo "Run the setup-firebase workflow to set the secret, OR"
              echo "enable Google Sign-In in Firebase Console -> Authentication."
              exit 1
            fi
          fi

      - name: Expo prebuild
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ env.GOOGLE_WEB_CLIENT_ID || secrets.GOOGLE_WEB_CLIENT_ID }}
        run: npx expo prebuild --platform android --clean || true

      - name: Verify build config
        run: |
          # Echo the resolved web client ID (masked) so the build log shows
          # exactly what was baked into the APK.
          if [ -n "$GOOGLE_WEB_CLIENT_ID" ]; then
            echo "Web client ID baked into APK: ${GOOGLE_WEB_CLIENT_ID:0:20}...${GOOGLE_WEB_CLIENT_ID: -4}"
          else
            echo "WARNING: GOOGLE_WEB_CLIENT_ID env not set - falling back to hardcoded default in app.config.js"
          fi
          # Confirm google-services.json was decoded
          if [ -f "google-services.json" ]; then
            echo "google-services.json present ($(wc -c < google-services.json) bytes)"
          else
            echo "ERROR: google-services.json missing - build will fail"
            exit 1
          fi

      - name: Install updated dependencies
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: npm install && npm install hermes-compiler

      - name: Fix splashscreen_logo drawable
        run: |
          mkdir -p android/app/src/main/res/drawable
          cp assets/icon.png android/app/src/main/res/drawable/splashscreen_logo.png

      # GOOGLE SIGN-IN: Sign with deterministic release keystore.
      # keystore/release.keystore SHA-1 is in google-services.json.
      - name: Configure release signing
        run: |
          cp keystore/release.keystore android/release.keystore
          python3 scripts/setup-release-signing.py android/app/build.gradle

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # Firebase App Distribution — distribute APK to testers
      - name: Distribute to Firebase App Distribution
        if: success()
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Install firebase-tools with retry to handle transient npm registry issues
          for i in 1 2 3; do
            echo "Attempt $i to install firebase-tools..."
            if npm install -g firebase-tools@latest; then
              echo "firebase-tools installed successfully"
              break
            fi
            echo "npm install failed, retrying in 10s..."
            sleep 10
          done
          printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS" > fb_service_account.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/fb_service_account.json
          firebase appdistribution:distribute \
            android/app/build/outputs/apk/release/*.apk \
            --app "1:815007868471:android:c1af5baab977db4a3441b2" \
            --release-notes "Build ${{ github.run_number }} from ${{ github.sha }}"
          rm -f fb_service_account.json
