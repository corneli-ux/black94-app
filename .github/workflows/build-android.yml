name: Build Android APK & AAB (Standalone for Device)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  build:
    name: Build Standalone Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle (no caching)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Install dependencies
        run: npm ci --prefer-offline || npm install

      - name: Clear caches
        run: |
          rm -rf node_modules/.cache .expo /tmp/metro-* || true
          npx expo export --clear 2>/dev/null || true

      - name: Expo export (create standalone bundle)
        run: npx expo export --platform android --output-dir dist

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Copy exported bundle into Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp -r dist/* android/app/src/main/assets/ || true
          echo "Bundle copied for standalone use"

      - name: Disable Gradle cache
        run: |
          echo "org.gradle.caching=false" >> android/gradle.properties
          echo "org.gradle.parallel=false" >> android/gradle.properties

      - name: Setup release keystore (if available)
        continue-on-error: true
        run: |
          if [ -f ci/black94-release.jks ]; then
            cp ci/black94-release.jks android/app/black94-release.jks
            echo "Keystore copied"
            sed -i '/signingConfigs {/a\        release {\n            storeFile file('\''black94-release.jks'\'')\n            storePassword '\''black94real'\''\n            keyAlias '\''black94'\''\n            keyPassword '\''black94real'\''\n        }' android/app/build.gradle
            sed -i 's/signingConfig signingConfigs\.debug/signingConfig signingConfigs.release/' android/app/build.gradle
            echo "Release signing config added"
          else
            echo "No keystore - will build debug"
          fi

      - name: Build Release APK + AAB (standalone)
        continue-on-error: true
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease bundleRelease --no-build-cache --no-daemon || echo "Release build had issues - trying debug fallback"

      - name: Upload Release APK (if built)
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Release AAB (if built)
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Build Debug APK (fallback, with bundle)
        if: failure() || success()
        run: |
          cd android
          ./gradlew clean assembleDebug --no-build-cache --no-daemon || true
          echo "Debug build attempted"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: black94-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
