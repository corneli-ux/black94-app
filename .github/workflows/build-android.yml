name: Build Android APK & AAB (Standalone for Device)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  build:
    name: Build Standalone Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle (no caching)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Install dependencies
        run: npm ci --prefer-offline || npm install

      - name: Create JS bundle for Android
        run: npx expo export --platform android --dev false --output-dir bundle

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Place JS bundle with correct filename
        run: |
          mkdir -p android/app/src/main/assets
          cp bundle/index.bundle android/app/src/main/assets/index.android.bundle
          echo "Placed index.android.bundle ($(du -h android/app/src/main/assets/index.android.bundle | cut -f1))"

      - name: Fix splashscreen_logo drawable
        run: |
          mkdir -p android/app/src/main/res/drawable
          cp assets/icon.png android/app/src/main/res/drawable/splashscreen_logo.png

      - name: Disable Gradle cache
        run: |
          echo "org.gradle.caching=false" >> android/gradle.properties
          echo "org.gradle.parallel=false" >> android/gradle.properties

      # === DEBUG BUILD (skip Gradle bundling - we already have the bundle) ===
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -x bundleDebugJsAndAssets -x createBundleDebugJsAndAssets --no-build-cache --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: black94-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # === RELEASE BUILD (best effort, needs keystore) ===
      - name: Build Release APK + AAB
        continue-on-error: true
        run: |
          if [ -f ../ci/black94-release.jks ]; then
            cp ../ci/black94-release.jks android/app/black94-release.jks
            cd android
            chmod +x gradlew
            ./gradlew assembleRelease bundleRelease -x bundleReleaseJsAndAssets -x createBundleReleaseJsAndAssets --no-build-cache --no-daemon
          else
            echo "No keystore found, skipping release build"
          fi

      - name: Upload Release APK
        if: success()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Release AAB
        if: success()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
