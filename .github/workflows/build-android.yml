name: Build Android APK & AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  build:
    name: Build Android (Debug + Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle (NO caching for reproducibility)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-includes: |
            wrappers/dists/**
          gradle-home-cache-excludes: |
            caches/**
            build-cache/**

      - name: Install npm dependencies (deterministic)
        run: npm ci --prefer-offline 2>&1 || npm install

      - name: Clear Metro and Expo caches
        run: |
          rm -rf node_modules/.cache
          rm -rf .expo
          rm -rf /tmp/metro-*
          rm -rf /tmp/haste-map-*
          npx expo export --clear 2>/dev/null || true
          echo "All Metro/Expo caches cleared"

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild --platform android --clean

      - name: Disable Gradle build cache
        run: |
          echo "org.gradle.caching=false" >> android/gradle.properties
          echo "org.gradle.parallel=false" >> android/gradle.properties
          echo "Gradle build cache and parallelism disabled for reproducible builds"

      - name: Fix splashscreen_logo drawable
        run: |
          cp assets/icon.png android/app/src/main/res/drawable/splashscreen_logo.png || true
          echo "Created splashscreen_logo drawable from app icon"

      # === DEBUG BUILD (ALWAYS SUCCEEDS - no signing needed) ===
      - name: Build Debug APK (reliable, always works)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-build-cache --no-daemon
          echo "=== Debug build complete ==="

      - name: Upload Debug APK (always available)
        uses: actions/upload-artifact@v4
        with:
          name: black94-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # === RELEASE BUILD (best effort - may fail if keystore secrets missing) ===
      - name: Setup release keystore and signing config
        continue-on-error: true
        run: |
          if [ -f ci/black94-release.jks ]; then
            cp ci/black94-release.jks android/app/black94-release.jks

            echo "=== Verifying keystore ==="
            keytool -list -v -keystore android/app/black94-release.jks \
              -storepass 'black94real' -alias 'black94' 2>&1 | grep SHA1 || echo "Keystore verification warning"

            python3 << 'PYEOF'
            filepath = 'android/app/build.gradle'
            with open(filepath, 'r') as f:
                lines = f.readlines()

            new_lines = []
            i = 0
            added_release_signing = False
            while i < len(lines):
                line = lines[i]

                if not added_release_signing and line.strip() == '}' and 'signingConfigs' in ''.join(lines[max(0,i-10):i]):
                    indent = '    '
                    new_lines.append(line)
                    new_lines.append(f'{indent}release {{\n')
                    new_lines.append(f'{indent}    storeFile file(\'black94-release.jks\')\n')
                    new_lines.append(f'{indent}    storePassword \'black94real\'\n')
                    new_lines.append(f'{indent}    keyAlias \'black94\'\n')
                    new_lines.append(f'{indent}    keyPassword \'black94real\'\n')
                    new_lines.append(f'{indent}}}\n')
                    added_release_signing = True
                    i += 1
                    continue

                if 'signingConfig signingConfigs.debug' in line:
                    line = line.replace('signingConfigs.debug', 'signingConfigs.release')

                new_lines.append(line)
                i += 1

            with open(filepath, 'w') as f:
                f.writelines(new_lines)

            print(f"Added release signing config: {added_release_signing}")
            PYEOF

            echo "=== Verifying build.gradle signing config ==="
            rg "signingConfig" android/app/build.gradle || echo "WARNING: no signingConfig found"
          else
            echo "No release keystore found - skipping release signing setup"
            exit 0
          fi

      - name: Build Release APK + AAB (best effort)
        continue-on-error: true
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease bundleRelease --no-build-cache --no-daemon || echo "Release build failed or skipped (keystore issue) - Debug APK is still available"
          echo "=== Release build attempt complete ==="

      - name: Upload Release APK (if successful)
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Release AAB (if successful)
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Verify JS bundle
        run: |
          BUNDLE_DIR="android/app/build/generated/assets/createBundleReleaseJsAndAssets"
          if [ -d "$BUNDLE_DIR" ]; then
            echo "JS bundle found:"
            ls -la "$BUNDLE_DIR/"*.bundle 2>/dev/null || ls -la "$BUNDLE_DIR"/index.android.bundle 2>/dev/null || true
          else
            echo "Note: Release bundle dir not found (normal if release build skipped)"
          fi
