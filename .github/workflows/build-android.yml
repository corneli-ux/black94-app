name: Build Android APK (Standalone - No Metro Needed)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  build:
    name: Build Standalone Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm install

      # Clean prebuild ensures fresh native project generation
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      # splashscreen_logo.png is referenced by the native splash screen code
      - name: Fix splashscreen_logo drawable
        run: |
          mkdir -p android/app/src/main/res/drawable
          cp assets/icon.png android/app/src/main/res/drawable/splashscreen_logo.png

      # ROOT CAUSE FIX: Build RELEASE APK, not Debug.
      # Debug APKs always try to connect to Metro dev server (localhost:8081)
      # to load JS -- they do NOT use the bundled file.
      # Release APKs embed the JS bundle and load it directly from the APK.
      # Gradle bundleReleaseJsAndAssets runs Metro internally to create
      # index.android.bundle, then packages it into the APK.
      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
