name: Build Android APK & AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install npm dependencies
        run: npm install

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild --platform android --clean

      # Patch build.gradle to skip x86/x86_64 (emulator-only) to prevent linker Bus errors
      - name: Patch build.gradle for device-only ABIs
        run: |
          cat > /tmp/patch_abi.py << 'PYEOF'
          import re
          
          filepath = 'android/app/build.gradle'
          with open(filepath, 'r') as f:
              content = f.read()
          
          # Find the defaultConfig block and add ndk abiFilters
          pattern = r'(defaultConfig\s*\{[^}]*?versionName\s+"[^"]+"\s*\n)'
          
          ndk_block = """
              // Only build real device architectures — skip x86/x86_64
              ndk {
                  abiFilters 'arm64-v8a', 'armeabi-v7a'
              }
          """
          
          replacement = r'\1' + ndk_block
          
          new_content = re.sub(pattern, replacement, content)
          
          if new_content != content:
              with open(filepath, 'w') as f:
                  f.write(new_content)
              print('Patched build.gradle with ABI filters')
          else:
              print('ABI filters already present or pattern not found')
          PYEOF
          python3 /tmp/patch_abi.py

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          echo "APK built successfully"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  build-aab:
    name: Build AAB (App Bundle)
    runs-on: ubuntu-latest
    needs: build-apk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install npm dependencies
        run: npm install

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Patch build.gradle for device-only ABIs
        run: |
          cat > /tmp/patch_abi.py << 'PYEOF'
          import re
          
          filepath = 'android/app/build.gradle'
          with open(filepath, 'r') as f:
              content = f.read()
          
          pattern = r'(defaultConfig\s*\{[^}]*?versionName\s+"[^"]+"\s*\n)'
          ndk_block = """
              ndk {
                  abiFilters 'arm64-v8a', 'armeabi-v7a'
              }
          """
          
          replacement = r'\1' + ndk_block
          new_content = re.sub(pattern, replacement, content)
          
          if new_content != content:
              with open(filepath, 'w') as f:
                  f.write(new_content)
              print('Patched build.gradle with ABI filters')
          else:
              print('ABI filters already present or pattern not found')
          PYEOF
          python3 /tmp/patch_abi.py

      - name: Build Release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
          echo "AAB built successfully"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
