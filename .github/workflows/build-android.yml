name: Build Android APK (Standalone - No Metro Needed)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  build:
    name: Build Standalone Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm install

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Fix splashscreen_logo drawable
        run: |
          mkdir -p android/app/src/main/res/drawable
          cp assets/icon.png android/app/src/main/res/drawable/splashscreen_logo.png

      # GOOGLE SIGN-IN FIX: Sign release APK with our release keystore.
      # The keystore SHA-1 is registered in google-services.json so
      # Google Sign-In works without any manual Firebase Console steps.
      - name: Configure release signing
        run: |
          cp keystore/release.keystore android/release.keystore
          cd android
          # Inject release signing config into build.gradle (after prebuild)
          sed -i 's|signingConfigs {|signingConfigs {\n        release {\n            storeFile file('\''../release.keystore'\'')\n            storePassword '\''black94release'\''\n            keyAlias '\''black94'\''\n            keyPassword '\''black94release'\''\n        }|' app/build.gradle
          # Change release buildType to use release signingConfig
          sed -i 's|signingConfig signingConfigs.debug|signingConfig signingConfigs.release|' app/build.gradle
          echo "Release signing configured"

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
