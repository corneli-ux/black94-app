name: Build Android APK (Standalone - No Metro Needed)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  build:
    name: Build Standalone Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        env:
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: npm install

      # Decode google-services.json from GitHub Secret before prebuild
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_B64" ]; then
            echo "$GOOGLE_SERVICES_B64" | base64 -d > google-services.json
            echo "google-services.json decoded successfully"
          else
            echo "ERROR: GOOGLE_SERVICES_JSON secret is not set"
            exit 1
          fi

      # Auto-fix dependency version mismatches so expo prebuild doesn't prompt
      # (Expo SDK 55 recommends react-native@0.83.6 but project uses 0.81.5)
      # --fix exits 1 due to peer dep warnings, but packages are correctly updated
      - name: Fix Expo dependency mismatches
        env:
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: npx expo install --fix || true

      - name: Expo prebuild
        env:
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: npx expo prebuild --platform android --clean

      - name: Fix splashscreen_logo drawable
        run: |
          mkdir -p android/app/src/main/res/drawable
          cp assets/icon.png android/app/src/main/res/drawable/splashscreen_logo.png

      # GOOGLE SIGN-IN: Sign with deterministic release keystore.
      # keystore/release.keystore SHA-1 is in google-services.json.
      - name: Configure release signing
        run: |
          cp keystore/release.keystore android/release.keystore
          python3 scripts/setup-release-signing.py android/app/build.gradle

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: black94-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # Firebase App Distribution — distribute APK to testers
      - name: Distribute to Firebase App Distribution
        if: success()
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Install firebase-tools with retry to handle transient npm registry issues
          for i in 1 2 3; do
            echo "Attempt $i to install firebase-tools..."
            if npm install -g firebase-tools@latest; then
              echo "firebase-tools installed successfully"
              break
            fi
            echo "npm install failed, retrying in 10s..."
            sleep 10
          done
          printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS" > fb_service_account.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/fb_service_account.json
          firebase appdistribution:distribute \
            android/app/build/outputs/apk/release/*.apk \
            --app "1:210565807767:android:4ad1db09a41334792373d2" \
            --release-notes "Build ${{ github.run_number }} from ${{ github.sha }}"
          rm -f fb_service_account.json
