name: Setup Firebase (memora-bond)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup and register app
        run: |
          pip install google-auth google-auth-httplib2 requests
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          python3 scripts/setup_firebase.py /tmp/sa.json

      - name: Install Firebase CLI and deploy rules
        run: |
          npm install -g firebase-tools
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          firebase deploy --only firestore:rules --project memora-bond --force || true
          firebase deploy --only storage --project memora-bond --force || true

      - name: Upload google-services.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: google-services-json
          path: google-services.json
          if-no-files-found: warn
