name: Setup Firebase (memora-bond)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Firebase
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json" >> $GITHUB_ENV

      - name: Get App ID and download google-services.json
        run: |
          echo "=== Listing apps ==="
          firebase apps:list --project memora-bond
          
          echo "=== Getting app ID ==="
          APP_ID=$(firebase apps:list ANDROID --project memora-bond --json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          apps = data.get('result', [])
          print(apps[0]['appId'] if apps else '')
          ")
          echo "App ID: [$APP_ID]"
          
          if [ -n "$APP_ID" ]; then
            echo "=== Downloading SDK config ==="
            firebase apps:sdkconfig ANDROID "$APP_ID" --project memora-bond
            firebase apps:sdkconfig ANDROID "$APP_ID" --project memora-bond > google-services.json
            echo "=== Content ==="
            cat google-services.json
            echo "=== File size ==="
            wc -c google-services.json
          fi

      - name: Upload google-services.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: google-services-json
          path: google-services.json
          if-no-files-found: warn
