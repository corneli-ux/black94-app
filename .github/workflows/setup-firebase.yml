name: Setup Firebase (memora-bond)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install google-auth google-auth-httplib2 requests PyNaCl

      - name: Setup Firebase and register Android app
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          python3 scripts/setup_firebase.py /tmp/sa.json

      - name: Update GOOGLE_SERVICES_JSON GitHub secret using PAT
        run: |
          python3 - << 'PYEOF'
          import base64, json, urllib.request
          from nacl import encoding, public

          TOKEN = '${{ secrets.PAT_TOKEN }}'
          REPO = 'corneli-ux/black94-app'

          with open('google-services.json') as f:
              gsf_content = f.read()
          gsf_b64 = base64.b64encode(gsf_content.encode()).decode()
          print(f'google-services.json size: {len(gsf_content)} chars')
          print(f'Base64 size: {len(gsf_b64)} chars')

          # Get public key
          req = urllib.request.Request(
              f'https://api.github.com/repos/{REPO}/actions/secrets/public-key',
              headers={'Authorization': f'token {TOKEN}', 'Accept': 'application/vnd.github.v3+json'}
          )
          with urllib.request.urlopen(req) as r:
              key_data = json.loads(r.read())
          KEY_ID = key_data['key_id']
          PUB_KEY = key_data['key']

          # Encrypt secret
          pk = public.PublicKey(PUB_KEY.encode(), encoding.Base64Encoder())
          box = public.SealedBox(pk)
          encrypted = base64.b64encode(box.encrypt(gsf_b64.encode())).decode()

          # Set secret
          payload = json.dumps({'encrypted_value': encrypted, 'key_id': KEY_ID}).encode()
          req = urllib.request.Request(
              f'https://api.github.com/repos/{REPO}/actions/secrets/GOOGLE_SERVICES_JSON',
              data=payload, method='PUT',
              headers={'Authorization': f'token {TOKEN}',
                       'Content-Type': 'application/json',
                       'Accept': 'application/vnd.github.v3+json'}
          )
          with urllib.request.urlopen(req) as r:
              print(f'Secret GOOGLE_SERVICES_JSON updated successfully (HTTP {r.status})')
          PYEOF

      - name: Deploy Firestore and Storage rules
        run: |
          npm install -g firebase-tools
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          firebase deploy --only firestore:rules --project memora-bond --force
          firebase deploy --only storage --project memora-bond --force

      - name: Done
        run: echo "Firebase setup complete for memora-bond project"
