name: Setup Firebase (memora-bond)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install google-auth google-auth-httplib2 requests PyNaCl
      - name: Setup Firebase
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          python3 scripts/setup_firebase.py /tmp/sa.json
      - name: Update secret
        run: |
          python3 << 'PYEOF'
          import base64, json, urllib.request
          from nacl import encoding, public
          TOKEN = '${{ secrets.PAT_TOKEN }}'
          REPO = 'corneli-ux/black94-app'
          with open('google-services.json') as f:
              gsf_content = f.read()
          gsf_b64 = base64.b64encode(gsf_content.encode()).decode()
          req = urllib.request.Request(f'https://api.github.com/repos/{REPO}/actions/secrets/public-key',
              headers={'Authorization': f'token {TOKEN}', 'Accept': 'application/vnd.github.v3+json'})
          with urllib.request.urlopen(req) as r:
              key_data = json.loads(r.read())
          pk = public.PublicKey(key_data['key'].encode(), encoding.Base64Encoder())
          encrypted = base64.b64encode(public.SealedBox(pk).encrypt(gsf_b64.encode())).decode()
          payload = json.dumps({'encrypted_value': encrypted, 'key_id': key_data['key_id']}).encode()
          req = urllib.request.Request(f'https://api.github.com/repos/{REPO}/actions/secrets/GOOGLE_SERVICES_JSON',
              data=payload, method='PUT',
              headers={'Authorization': f'token {TOKEN}', 'Content-Type': 'application/json'})
          with urllib.request.urlopen(req) as r:
              print(f'Secret updated: HTTP {r.status}')
          PYEOF
      - name: Deploy rules
        run: |
          npm install -g firebase-tools
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          sleep 10
          firebase deploy --only firestore:rules --project memora-bond --force || \
          (sleep 30 && firebase deploy --only firestore:rules --project memora-bond --force) || true
          firebase deploy --only storage --project memora-bond --force || true
          echo "Setup complete"
