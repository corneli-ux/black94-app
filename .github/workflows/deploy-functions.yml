name: Deploy Firebase Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Functions & Set Secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Firebase
        run: |
          printf '%s' "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > fb_service_account.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/fb_service_account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/fb_service_account.json" >> $GITHUB_ENV

      - name: Install functions dependencies
        run: cd functions && npm install

      - name: Set Firebase Secrets
        run: |
          echo "${{ secrets.RAZORPAY_KEY_ID }}" | firebase functions:secrets:set RAZORPAY_KEY_ID --project black94 --force
          echo "${{ secrets.RAZORPAY_KEY_SECRET }}" | firebase functions:secrets:set RAZORPAY_KEY_SECRET --project black94 --force
          echo "${{ secrets.RAZORPAY_WEBHOOK_SECRET }}" | firebase functions:secrets:set RAZORPAY_WEBHOOK_SECRET --project black94 --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: Deploy Cloud Functions
        run: firebase deploy --only functions --project black94
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
