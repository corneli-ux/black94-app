name: Deploy Firebase Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Functions & Set Secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate with GCP Service Account
        run: |
          printf '%s' "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > /tmp/fb_sa.json
          gcloud auth activate-service-account --key-file=/tmp/fb_sa.json
          gcloud config set project black94

      - name: Install functions dependencies
        run: cd functions && npm install

      - name: Set Firebase Secrets
        run: |
          echo "${{ secrets.RAZORPAY_KEY_ID }}" | firebase functions:secrets:set RAZORPAY_KEY_ID --project black94 --force
          echo "${{ secrets.RAZORPAY_KEY_SECRET }}" | firebase functions:secrets:set RAZORPAY_KEY_SECRET --project black94 --force
          echo "${{ secrets.RAZORPAY_WEBHOOK_SECRET }}" | firebase functions:secrets:set RAZORPAY_WEBHOOK_SECRET --project black94 --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/fb_sa.json

      - name: Deploy Cloud Functions
        run: firebase deploy --only functions --project black94
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/fb_sa.json
