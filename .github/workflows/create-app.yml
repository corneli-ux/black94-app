name: Create New Package App
on:
  workflow_dispatch:
jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-auth google-auth-httplib2 requests
      - name: Download google-services.json for new package
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          python3 << 'PYEOF'
          import json, base64
          import google.auth.transport.requests
          from google.oauth2 import service_account
          import requests
          with open('/tmp/sa.json') as f: sa = json.load(f)
          PROJECT = sa['project_id']
          NEW_PKG = 'com.black94.social'
          creds = service_account.Credentials.from_service_account_info(sa,
              scopes=['https://www.googleapis.com/auth/cloud-platform','https://www.googleapis.com/auth/firebase'])
          creds.refresh(google.auth.transport.requests.Request())
          h = {'Authorization': f'Bearer {creds.token}'}
          r = requests.get(f'https://firebase.googleapis.com/v1beta1/projects/{PROJECT}/androidApps', headers=h)
          target = None
          for app in r.json().get('apps', []):
              if app.get('packageName') == NEW_PKG:
                  target = app['appId']
          cfg = requests.get(f'https://firebase.googleapis.com/v1beta1/projects/{PROJECT}/androidApps/{target}/config', headers=h)
          content = base64.b64decode(cfg.json()['configFileContents']).decode()
          with open('google-services.json', 'w') as f:
              f.write(content)
          gsf = json.loads(content)
          types = set()
          for c in gsf.get('client', []):
              for o in c.get('oauth_client', []): types.add(o.get('client_type'))
          print(f"::notice title=Config::pkg={NEW_PKG} types={sorted(types)}")
          PYEOF
      - name: Commit
        run: |
          git config user.email "ci@black94.app"
          git config user.name "CI"
          git add google-services.json
          git commit -m "feat: google-services.json for com.black94.social" || echo "no change"
          git push origin main || echo "push failed"
