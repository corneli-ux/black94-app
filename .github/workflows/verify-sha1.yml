name: Verify SHA-1 Registration

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install google-auth google-auth-httplib2 requests
      - name: Register SHA-1 and verify
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          python3 scripts/ensure_sha1_registered.py /tmp/sa.json 2>&1 | tee /tmp/out.txt
          python3 << 'PYEOF'
          import json
          try:
              with open('google-services.json') as f:
                  gsf = json.load(f)
              types_found = set()
              for client in gsf.get('client', []):
                  for oauth in client.get('oauth_client', []):
                      types_found.add(oauth.get('client_type'))
              has1 = 1 in types_found
              has3 = 3 in types_found
              # Emit as GitHub notice annotation (readable via check-runs API)
              print(f"::notice title=ClientTypes::types={sorted(types_found)} android_type1={has1} web_type3={has3}")
          except Exception as e:
              print(f"::notice title=ClientTypes::error={e}")
          PYEOF
          # Also emit the key script result lines as notices
          grep -i "registered\|SHA-1\|fingerprint\|VERIFIED\|WARNING\|SUCCESS\|ERROR" /tmp/out.txt | head -10 | while read line; do
            echo "::notice title=SHA1::$line"
          done
