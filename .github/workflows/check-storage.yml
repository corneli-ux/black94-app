name: Check Storage
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-auth google-auth-httplib2 requests
      - name: Provision storage bucket
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          python3 << 'PYEOF'
          import json
          import google.auth.transport.requests
          from google.oauth2 import service_account
          import requests
          with open('/tmp/sa.json') as f: sa = json.load(f)
          PROJECT = sa['project_id']
          PROJECT_NUMBER = '815007868471'
          creds = service_account.Credentials.from_service_account_info(sa,
              scopes=['https://www.googleapis.com/auth/cloud-platform','https://www.googleapis.com/auth/firebase','https://www.googleapis.com/auth/devstorage.full_control'])
          creds.refresh(google.auth.transport.requests.Request())
          h = {'Authorization': f'Bearer {creds.token}', 'Content-Type': 'application/json'}

          # Try to add/provision the default Firebase Storage bucket
          # AddFirebase makes an existing GCS bucket accessible to Firebase
          bucket_fb = f'{PROJECT}.firebasestorage.app'
          bucket_gcs = f'{PROJECT}.appspot.com'

          # First, try creating the GCS bucket directly
          for bname in [bucket_fb, bucket_gcs]:
              create = requests.post(
                  f'https://storage.googleapis.com/storage/v1/b?project={PROJECT}',
                  headers=h,
                  json={'name': bname, 'location': 'US', 'storageClass': 'STANDARD'})
              print(f"::notice title=CreateGCS::name={bname} status={create.status_code}")
              if not create.ok:
                  msg = create.text[:150].replace(bname, 'BUCKET')
                  print(f"::notice title=CreateErr::{msg}")
              else:
                  # Link it to Firebase
                  link = requests.post(
                      f'https://firebasestorage.googleapis.com/v1beta/projects/{PROJECT}/buckets/{bname}:addFirebase',
                      headers=h)
                  print(f"::notice title=AddFirebase::name={bname} status={link.status_code}")
          PYEOF
