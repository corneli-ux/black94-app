name: Check Storage
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-auth google-auth-httplib2 requests
      - name: Check bucket exists
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          python3 << 'PYEOF'
          import json
          import google.auth.transport.requests
          from google.oauth2 import service_account
          import requests
          with open('/tmp/sa.json') as f: sa = json.load(f)
          PROJECT = sa['project_id']
          creds = service_account.Credentials.from_service_account_info(sa,
              scopes=['https://www.googleapis.com/auth/cloud-platform'])
          creds.refresh(google.auth.transport.requests.Request())
          h = {'Authorization': f'Bearer {creds.token}'}
          for bucket in [f'{PROJECT}.firebasestorage.app', f'{PROJECT}.appspot.com']:
              r = requests.get(f'https://storage.googleapis.com/storage/v1/b/{bucket}', headers=h)
              print(f"::notice title=Bucket::{bucket} status={r.status_code} {'EXISTS' if r.ok else 'MISSING'}")
          PYEOF
