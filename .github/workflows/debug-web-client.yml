name: Debug Web Client ID

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install google-auth google-auth-httplib2 requests
      - name: Fetch web client ID prefix
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          python3 scripts/get_web_client_id.py /tmp/sa.json > /tmp/result.txt 2>&1
          WEB_CLIENT=$(grep "^FOUND_WEB_CLIENT_ID=" /tmp/result.txt | head -1 | cut -d= -f2-)
          # Only expose the project-number prefix (safe - it's public in google-services.json)
          PREFIX=$(echo "$WEB_CLIENT" | cut -d- -f1)
          echo "WEB CLIENT PREFIX: $PREFIX"
          echo "project_prefix=$PREFIX" > /tmp/prefix.txt
          # Write to committed file
          echo "Web client project number prefix: $PREFIX" > WEBCLIENT_PREFIX.txt
          echo "Old black94 project was: 210565807767" >> WEBCLIENT_PREFIX.txt
          echo "New memora-bond project is: 815007868471" >> WEBCLIENT_PREFIX.txt
          if [ "$PREFIX" = "210565807767" ]; then
            echo "STILL_OLD_BLACK94=true (BAD - needs update)" >> WEBCLIENT_PREFIX.txt
          elif [ "$PREFIX" = "815007868471" ]; then
            echo "CORRECT_NEW_MEMORA_BOND=true" >> WEBCLIENT_PREFIX.txt
          else
            echo "UNKNOWN_PROJECT=true" >> WEBCLIENT_PREFIX.txt
          fi
      - name: Commit prefix
        run: |
          git config user.email "ci@black94.app"
          git config user.name "CI"
          git add WEBCLIENT_PREFIX.txt
          git diff --staged --quiet || git commit -m "debug: web client prefix"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/corneli-ux/black94-app.git HEAD:main || true
