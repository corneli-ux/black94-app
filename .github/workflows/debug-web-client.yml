name: Debug Web Client ID

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install google-auth google-auth-httplib2 requests

      - name: Fetch web client ID and write to repo
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          python3 scripts/get_web_client_id.py /tmp/sa.json > /tmp/result.txt 2>&1
          cat /tmp/result.txt
          # Extract the found client ID
          WEB_CLIENT=$(grep "^FOUND_WEB_CLIENT_ID=" /tmp/result.txt | head -1 | cut -d= -f2-)
          # Write a debug file (NOT the full secret, just confirming it's found)
          echo "# Web Client ID Debug" > WEB_CLIENT_DEBUG.md
          echo "Found: $WEB_CLIENT" >> WEB_CLIENT_DEBUG.md
          echo "Full output:" >> WEB_CLIENT_DEBUG.md
          echo '```' >> WEB_CLIENT_DEBUG.md
          cat /tmp/result.txt >> WEB_CLIENT_DEBUG.md
          echo '```' >> WEB_CLIENT_DEBUG.md

      - name: Commit debug file
        run: |
          git config user.email "ci@black94.app"
          git config user.name "CI"
          git add WEB_CLIENT_DEBUG.md
          git diff --staged --quiet || git commit -m "debug: web client ID lookup result"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/corneli-ux/black94-app.git main || true
